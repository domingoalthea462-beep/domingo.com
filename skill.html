<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            padding: 40px 20px;
            background-color: #lightcoral;
        }

        .skills-section {
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: blue;
            margin-bottom: 40px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            text-align:center;
        }

        .skill-card {
            background: transparent;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .skill-img {
            width: 75%;
            height: 150px;
            object-fit: cover;
            border-radius:50%;
        }

        .skill-content {
            padding: 20px;
        }

        .skill-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .skill-desc {
            font-size: 14px;
            color: #666;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="skills-section">
        <h2 class="section-title">SKILLS</h2>

        <div class="skills-grid">
            
            <div class="skill-card">
                <img src="clean.jpg" alt="Cleaning" class="skill-img">
                <div class="skill-content">
                    <h3 class="skill-title">Cleaning</h3>
                    <p class="skill-desc">  I like cleaning and keeping my things organized,I like doing household chore.</p>
                </div>
            </div>

           
            <div class="skill-card">
                <img src="cook.jpg" alt="Cooking" class="skill-img">
                <div class="skill-content">
                    <h3 class="skill-title">Cooking</h3>
                    <p class="skill-desc">I like cooking simple food like noodles,adobo,ginisang ampalaya and other dishes.</p>
                </div>
            </div>

            <div class="skill-card">
                <img src="garden.jpg" alt="Planting" class="skill-img">
                <div class="skill-content">
                    <h3 class="skill-title">Planting</h3>
                    <p class="skill-desc">I do gardening by watering the plants, and planting halaman.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
